name: 🤖 CI

on: [push, workflow_dispatch]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  format:
    name: 🔤 Oxfmt
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v5

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: ".nvmrc"

      - name: 📥 Install deps
        run: pnpm install

      - name: 🔤 Format check
        run: pnpm dlx oxfmt --check .

  lint:
    name: ⬣ ESLint
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v5

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: ".nvmrc"

      - name: 📥 Install deps
        run: pnpm install

      - name: 🔬 Lint
        run: pnpm run lint

  test:
    name: 🩺 Tests
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v5

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: ".nvmrc"

      - name: 📥 Install deps
        run: pnpm install

      - name: 🃏 Jest with coverage
        run: pnpm run test:coverage

      - name: ☂ Codecov
        uses: codecov/codecov-action@v6
        with:
          fail_ci_if_error: true

  build:
    name: ⚒️ Build
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v5

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: ".nvmrc"

      - name: 📥 Install deps
        run: pnpm install

      - name: ⚙️ Build
        run: pnpm run prepack

  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    needs: [format, lint, test, build]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v5

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: ".nvmrc"

      - name: 📥 Install deps
        run: pnpm install

      - name: 🦋 Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run changeset:version
          publish: pnpm run changeset:publish
          commit: "chore: release"
          title: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
